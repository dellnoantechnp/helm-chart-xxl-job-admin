{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    {{- include "fleet-management.labels" . | nindent 4 }}
  name: {{ include "fleet-management.resourceName" (dict "suffix" "gateway" "context" $) }}
  namespace: {{ .Release.Namespace }}
  annotations:
    ## Envoy does not interact with the Kubernetes API; no RBAC bindings are created.
{{- end }}
